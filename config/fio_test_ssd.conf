# FIO 测试配置 — 固态硬盘 (SSD)
# 使用: ./fio_auto_test.sh --config config/fio_test_ssd.conf -y
#
# 建议:
#   企业级 NVMe: iodepth=128, numjobs=16
#   消费级 NVMe: iodepth=64, numjobs=8
#   SATA SSD:    iodepth=32, numjobs=4

# RAW_DEVICE=""
TEST_DIR=/data/test/fio
TEST_FILE_SIZE=50G
RUNTIME=180
RAMP_TIME=20
IODEPTH=128
NUMJOBS=16
KEEP_TEST_FILE=false
INVALIDATE_CACHE=1

TEST_SCENARIOS=4m-seqread:read:4m, \
               4m-seqwrite:write:4m, \
               4k-randread:randread:4k, \
               4k-randwrite:randwrite:4k, \
               64k-randread:randread:64k, \
               64k-randwrite:randwrite:64k, \
               256k-randread:randread:256k, \
               256k-randwrite:randwrite:256k, \
               4k-randrw-20:randrw:4k:20, \
               4k-randrw-80:randrw:4k:80, \
               64k-randrw-20:randrw:64k:20, \
               64k-randrw-80:randrw:64k:80, \
               256k-randrw-20:randrw:256k:20, \
               256k-randrw-80:randrw:256k:80
